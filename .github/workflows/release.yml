name: Update Changelog

on:
  push:
    branches:
      - main

jobs:
  release:
    # 防止死循环：如果是机器人自己推的，就跳过
    if: ${{ github.actor != 'github-actions[bot]' }}
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Generate Changelog
        # 关键参数：
        # --no-commit: 不生成新的 Git Commit
        # --no-tag: 不打 Tag，不升级 package.json 版本
        # 它只会把最新的变更追加到 CHANGELOG.md 的 "Unreleased" 区域
        run: npx standard-version --no-commit --no-tag

      - name: Push Changelog
        # 只有 CHANGELOG.md 文件有变化时才推送
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只有 CHANGELOG.md 变了才会提交
          git add CHANGELOG.md
          git commit -m "docs: update changelog [skip ci]" || exit 0
          git push origin main